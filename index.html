<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/reset.css"/>
    <link rel="stylesheet" href="styles/global.css"/>
    <link rel="icon" type="image/png" href="resources/img_no_back.png"/>
    <script src="index.js" defer></script>
    <title>My Page</title>
</head>

<body>
        <header>

            <div class="container">
                            <div id="topbar">
                                <img src="resources/img_no_back.png" alt="">
                                <div id="titles">
                                    <h1 id="title">BooKat</h1>
                                    <h2>Reading as a lifestyle</h2>
                                </div>
                            </div>
                <nav class="navbar">
                    <ul>
                        <li><a href="">Home</a></li>
                        <li><a href="">Leituras</a></li>
                        <li><a href="">Socials</a></li>
                        <li><a href="">Contact</a></li>
                    </ul>
                </nav>
                
            </div>
        </header>
        <main>
            <section reading-form>
                <div>
                    <h2>Cadastre de leituras:</h2>
                </div>
                <form action="" method="POST" id="reading-form">

                    <label for="token">token JWT: </label>
                    <input type="text" name="token" id="token">

                    <label for="currentPage"></label>
                    <input type="number" id="currentPage" min="1" name="currentPage">

                    <label for="readingStatus"></label>
                    <select name="readingStatus" id="readingStatus">
                        <option disabled value="none">--selecione uma opção</option>
                        <option value="READ">Lido</option>
                        <option value="READING">Lendo</option>
                        <option value="TO_READ">A ler</option>
                    </select>

                    <label for="readingStartDate">Inicio da leitura:</label>
                    <input type="date" id="readingStartDate" name="readingStartDate">

                    <label for="readingFinishDate">Término  da leitura:</label>
                    <input type="date" id="readingFinishDate" name="readingFinishDate">

                    <label for="feedback">Feedback:</label>
                    <input type="text" id="feedback" name="feedback">

                    <label for="bookId">BookId:</label>
                    <input type="text" id="bookId" name="bookId">

                    <label for="groupId">GroupId:</label>
                    <input type="text" id="groupId" name="groupId">

                    
                    <input type="submit" name="send" id="send" value="Enviar">

                </form>
            </section>
        </main>
        <footer>

        </footer>
</body>
</html>
